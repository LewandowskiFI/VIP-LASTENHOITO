<!doctype html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rekisteröidy - VIP.Care</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-secondary);
      padding: 2rem;
    }
    .auth-card {
      background: var(--bg-primary);
      width: 100%;
      max-width: 420px;
      padding: 3rem 2rem;
      border-radius: var(--border-radius-large);
      box-shadow: var(--shadow-subtle);
      text-align: center;
    }
    .auth-card .logo { margin-bottom: 2rem; display: inline-block; }
    .form-group { margin-bottom: 1.5rem; text-align: left; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-primary); font-size: 0.95rem; }
    .form-group input { 
      width: 100%; padding: 14px 16px; border-radius: var(--border-radius-medium);
      border: 1px solid var(--bg-tertiary); font-family: inherit; font-size: 1rem;
      transition: var(--transition);
    }
    .form-group input:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2); }
    .auth-footer { margin-top: 2rem; color: var(--text-secondary); font-size: 0.95rem; }
    .auth-footer a { color: var(--accent-color); font-weight: 600; }
    .error-tag { color: #ff3b30; font-size: 0.9rem; margin-top: 1rem; display: none; }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="logo">VIP.Care</a>
      <h2 style="margin-bottom: 0.5rem;">Luo uusi tili</h2>
      <p style="color: var(--text-secondary); margin-bottom: 2rem;">Löydä alueesi parhaat asiantuntijat hetkessä.</p>
      
      <form id="regForm">
        <div class="form-group">
          <label>Nimi</label>
          <input type="text" id="name" placeholder="Matti Meikäläinen" required>
        </div>
        <div class="form-group">
          <label>Sähköpostiosoite</label>
          <input type="email" id="email" placeholder="nimi@esimerkki.fi" required>
        </div>
        <div class="form-group">
          <label>Salasana (väh. 6 merkkiä)</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6">
        <div class="form-group">
          <label>Mitä etsit?</label>
          <select id="role" style="width: 100%; padding: 14px 16px; border-radius: var(--border-radius-medium); border: 1px solid var(--bg-tertiary); font-family: inherit; font-size: 1rem; background: transparent;">
            <option value="parent">Haluan varata hoitajia perheelle</option>
            <option value="caretaker">Haluan tarjota asiantuntijahoitoa</option>
          </select>
        </div>
        <p id="errorMsg" class="error-tag"></p>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Rekisteröidy</button>
      </form>
      
      <div class="auth-footer">
        Onko sinulla jo tili? <a href="login.html">Kirjaudu sisään</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    document.getElementById('regForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const n = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const pwd = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      const btn = this.querySelector('button[type="submit"]');
      btn.textContent = 'Lasketaan...';
      
      const res = await registerUser(n, email, pwd, role);
      if(res.success) {
        window.location.href = 'dashboard.html';
      } else {
        btn.textContent = 'Rekisteröidy';
        const err = document.getElementById('errorMsg');
        err.style.display = 'block';
        err.textContent = res.message;
      }
    });
  </script>
</body>
</html>
